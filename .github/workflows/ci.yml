name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Nightly L2+L3 (UTC)
    - cron: '0 18 * * *'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  Configuration: Release

jobs:
  l1-unit:
    name: L1 Unit (no DB)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Xugu.EFCore.Xugu.sln

      - name: Build
        run: dotnet build Xugu.EFCore.Xugu.sln -c ${{ env.Configuration }} --no-restore

      - name: Harness verify
        shell: pwsh
        run: harness/scripts/verify.ps1

      - name: L1 Unit gate
        shell: pwsh
        run: harness/scripts/run-unit-gate.ps1 -Configuration ${{ env.Configuration }} -NoBuild

  l2-native:
    name: L2 Integration native (full)
    runs-on: windows-latest
    needs: l1-unit
    if: >
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore & build
        run: |
          dotnet restore Xugu.EFCore.Xugu.sln
          dotnet build Xugu.EFCore.Xugu.sln -c ${{ env.Configuration }} --no-restore

      - name: Require connection secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.XUGU_CONNECTION_STRING }}')) {
            throw 'XUGU_CONNECTION_STRING secret is required for L2 on main/nightly/tag'
          }

      - name: L2 native RuntimeGap gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-runtime-gap-gate.ps1 -Configuration ${{ env.Configuration }} -DialectMode native

      - name: L2 native AppCapabilityMatrix gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-app-matrix-gate.ps1 -Configuration ${{ env.Configuration }} -DialectMode native -NoBuild

      - name: L2 native full gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-native-gate.ps1 -Configuration ${{ env.Configuration }} -MaxAttempts 3 -NoBuild

  l2-compat:
    name: L2 Integration compat (full)
    runs-on: windows-latest
    needs: l2-native
    if: >
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore & build
        run: |
          dotnet restore Xugu.EFCore.Xugu.sln
          dotnet build Xugu.EFCore.Xugu.sln -c ${{ env.Configuration }} --no-restore

      - name: L2 compat RuntimeGap gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-runtime-gap-gate.ps1 -Configuration ${{ env.Configuration }} -DialectMode compat

      - name: L2 compat AppCapabilityMatrix gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-app-matrix-gate.ps1 -Configuration ${{ env.Configuration }} -DialectMode compat -NoBuild

      - name: L2 compat full gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-compat-gate.ps1 -Configuration ${{ env.Configuration }} -MaxAttempts 3 -NoBuild

  l3-experiential:
    name: L3 Experiential
    runs-on: windows-latest
    needs: l2-compat
    if: >
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore & build
        run: |
          dotnet restore Xugu.EFCore.Xugu.sln
          dotnet build Xugu.EFCore.Xugu.sln -c ${{ env.Configuration }} --no-restore

      - name: L3 experiential gate
        shell: pwsh
        env:
          XUGU_CONNECTION_STRING: ${{ secrets.XUGU_CONNECTION_STRING }}
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/run-experiential-gate.ps1 -Configuration ${{ env.Configuration }}

  pack:
    name: NuGet pack (tag)
    runs-on: windows-latest
    needs: l1-unit
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Pack release
        shell: pwsh
        env:
          XUGU_NATIVE_DLL_PATH: ${{ secrets.XUGU_NATIVE_DLL_PATH }}
        run: harness/scripts/publish-nuget.ps1 -Pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
