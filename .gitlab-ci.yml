# XuguDB EF Core Provider — GitLab CI (L1/L2/L3 baseline)
# Variables (Settings → CI/CD → Variables, masked):
#   XUGU_CONNECTION_STRING  — required for L2/L3 on main / nightly / tags
#   XUGU_NATIVE_DLL_PATH    — optional
#   GITLAB_NUGET_FEED_URL / GITLAB_NUGET_API_KEY — publish job

stages:
  - build
  - test
  - pack

variables:
  Configuration: Release
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

.default_dotnet:
  tags:
    - windows
  before_script:
    - dotnet --version

l1-unit:
  extends: .default_dotnet
  stage: build
  script:
    - dotnet restore Xugu.EFCore.Xugu.sln
    - dotnet build Xugu.EFCore.Xugu.sln -c $env:Configuration --no-restore
    - pwsh harness/scripts/verify.ps1
    - pwsh harness/scripts/run-unit-gate.ps1 -Configuration $env:Configuration -NoBuild
  artifacts:
    paths:
      - "**/bin/Release/"
      - "**/obj/Release/"
    expire_in: 1 day

l2-native:
  extends: .default_dotnet
  stage: test
  needs: [l1-unit]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - |
      if ([string]::IsNullOrWhiteSpace($env:XUGU_CONNECTION_STRING)) {
        throw "XUGU_CONNECTION_STRING is required for L2"
      }
    - pwsh harness/scripts/run-runtime-gap-gate.ps1 -Configuration $env:Configuration -DialectMode native
    - pwsh harness/scripts/run-app-matrix-gate.ps1 -Configuration $env:Configuration -DialectMode native -NoBuild
    - pwsh harness/scripts/run-native-gate.ps1 -Configuration $env:Configuration -MaxAttempts 3 -NoBuild

l2-compat:
  extends: .default_dotnet
  stage: test
  needs: [l2-native]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - pwsh harness/scripts/run-runtime-gap-gate.ps1 -Configuration $env:Configuration -DialectMode compat
    - pwsh harness/scripts/run-app-matrix-gate.ps1 -Configuration $env:Configuration -DialectMode compat -NoBuild
    - pwsh harness/scripts/run-compat-gate.ps1 -Configuration $env:Configuration -MaxAttempts 3 -NoBuild

l3-experiential:
  extends: .default_dotnet
  stage: test
  needs: [l2-compat]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - pwsh harness/scripts/run-experiential-gate.ps1 -Configuration $env:Configuration

pack:
  extends: .default_dotnet
  stage: pack
  needs: [l1-unit]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - pwsh harness/scripts/publish-nuget.ps1 -Pack
  artifacts:
    paths:
      - artifacts/*.nupkg
      - artifacts/*.snupkg
    expire_in: 30 days

publish-nuget:
  extends: .default_dotnet
  stage: pack
  needs: [pack]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: manual
  script:
    - pwsh harness/scripts/publish-nuget.ps1 -Pack -Push
  allow_failure: true
