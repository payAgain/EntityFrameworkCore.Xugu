# XuguDB EF Core Provider — GitLab CI (Phase 10.001)
# Secrets (Settings → CI/CD → Variables, masked):
#   XUGU_CONNECTION_STRING  — 实库连接串（test-integration 必需）
#   XUGU_NATIVE_DLL_PATH    — 可选；默认 external/csharp-driver/test_xugusql/64/xugusql.dll
#   GITLAB_NUGET_FEED_URL     — publish job 可选
#   GITLAB_NUGET_API_KEY      — publish job 可选

stages:
  - build
  - test
  - pack

variables:
  Configuration: Release
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

.default_dotnet:
  tags:
    - windows
  before_script:
    - dotnet --version

build:
  extends: .default_dotnet
  stage: build
  script:
    - dotnet restore Xugu.EFCore.Xugu.sln
    - dotnet build Xugu.EFCore.Xugu.sln -c $env:Configuration --no-restore
    - pwsh harness/scripts/verify.ps1
  artifacts:
    paths:
      - "**/bin/Release/"
      - "**/obj/Release/"
    expire_in: 1 day

test:
  extends: .default_dotnet
  stage: test
  needs: [build]
  script:
    - dotnet test Xugu.EFCore.Xugu.sln -c $env:Configuration --verbosity minimal
  allow_failure: false

test-integration:
  extends: .default_dotnet
  stage: test
  needs: [build]
  rules:
    - if: $XUGU_CONNECTION_STRING
  script:
    - pwsh harness/scripts/verify.ps1 -RunTests
    - |
      $count = (dotnet test test/EFCore.Xugu.Tests -c Release --no-build --list-tests | Select-String '^\s+[A-Za-z]' | Measure-Object).Count
      Write-Host "Listed tests: $count (baseline 676)"
      if ($count -lt 676) { throw "Test count regressed below 676" }

pack:
  extends: .default_dotnet
  stage: pack
  needs: [build, test]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script:
    - pwsh harness/scripts/publish-nuget.ps1 -Pack
  artifacts:
    paths:
      - artifacts/*.nupkg
      - artifacts/*.snupkg
    expire_in: 30 days

publish-nuget:
  extends: .default_dotnet
  stage: pack
  needs: [pack]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      when: manual
  script:
    - pwsh harness/scripts/publish-nuget.ps1 -Pack -Push
  allow_failure: true
